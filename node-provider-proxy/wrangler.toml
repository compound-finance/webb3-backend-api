main = "src/index.ts"

# support most-recent cloudflare workers features as of writing
compatibility_date = "2022-08-11"
# node_compat is needed to access builtins, e.g. Buffer
node_compat = true
# unbound workers have an extended subrequest limit of 1,000/invocation
usage_model = "unbound"
# worker will not deploy to *.workers.dev built-in preview/dev environment
workers_dev = false

# the default environment is "local"
name = "node-provider-proxy-local"

# running locally, the worker should bind to ephemeral KV stores
# [preview_]id are meaningless but mandatory for `wrangler dev --local`
kv_namespaces = [
    { binding = "kv", preview_id = "preview:kv", id = "nil" },
]

[vars]
# secrets
allowedAppKey = ''
allowedHosts = []
alchemyEthMainnet = 'ALCHEMY_XXX'
alchemyArbMainnet = 'ALCHEMY_XXX'
alchemyPolygonMainnet = 'ALCHEMY_XXX'
alchemyBaseMainnet = 'ALCHEMY_XXX'
alchemyScrollMainnet = 'ALCHEMY_XXX'
alchemyOptMainnet = 'ALCHEMY_XXX'
alchemyMantleMainnet = 'ALCHEMY_XXX'
alchemyLineaMainnet = 'ALCHEMY_XXX'
alchemyUnichainMainnet = 'ALCHEMY_XXX'
alchemyRoninMainnet = 'ALCHEMY_XXX'
quicknodeEthMainnet = 'QUICK_NODE_XXX'
quicknodeEthMainnetSubdomain = 'QUICK_NODE_XXX'

[vars.settings]
maskUpstreamErrors                    = false # show errors for debugging
retryWithActiveFallback               = false # do not retry for clients
retryIndividualFailedRpcs             = false # do not retry single rpcs
defaultFallbackExpirationTtlSeconds   = 60    # 60s = 1m fallback TTL
defaultRetryAfterUpstreamErrorSeconds = 5     #  5s backoff Retry-After

[env.production-v2.vars]
allowedHosts = ["v2-app.comp.xyz", "v2-pinata-host.comp.xyz"]

# secrets: ^^^ same as above, manage with wrangler
[env.production-v2.vars.settings]
maskUpstreamErrors                    = true  # obscure upstream errors
retryWithActiveFallback               = false # do not retry for clients
retryIndividualFailedRpcs             = true  # retry single failed rpcs
defaultFallbackExpirationTtlSeconds   = 600   # 10 * 60s = 10m
defaultRetryAfterUpstreamErrorSeconds = 10    # 30s backoff Retry-After

[env.production-v2]
name = "node-provider-v2"
routes = [
    { pattern = "node-provider-v2.comp.xyz", custom_domain = true },
]
kv_namespaces = [
    { binding = "kv", id = "b656c8d3ba254c2189a436373efab3ef" },
]

[env.production-v3-app.vars]
allowedHosts = ["v3-app.comp.xyz", "v3-pinata-host.comp.xyz"]

[env.production-v3-app.vars.settings]
maskUpstreamErrors                    = true  # obscure upstream errors
retryWithActiveFallback               = false # do not retry for clients
retryIndividualFailedRpcs             = true  # retry single failed rpcs
defaultFallbackExpirationTtlSeconds   = 600   # 10 * 60s = 10m
defaultRetryAfterUpstreamErrorSeconds = 10    # 30s backoff Retry-After

[env.production-v3-app]
name = "node-provider-v3-app"
routes = [
    { pattern = "node-provider-v3-app.comp.xyz", custom_domain = true },
]
kv_namespaces = [
    { binding = "kv", id = "d38d6e90c1d44dc0b8a6a9acc4dd2d64" },
]

[env.production-v3-api.vars]
allowedHosts = []

[env.production-v3-api.vars.settings]
maskUpstreamErrors                    = true  # obscure upstream errors
retryWithActiveFallback               = false # do not retry for clients
retryIndividualFailedRpcs             = true  # retry single failed rpcs
defaultFallbackExpirationTtlSeconds   = 600   # 10 * 60s = 10m
defaultRetryAfterUpstreamErrorSeconds = 10    # 30s backoff Retry-After

[env.production-v3-api]
name = "node-provider-v3-api"
routes = [
    { pattern = "node-provider-v3-api.comp.xyz", custom_domain = true },
]
kv_namespaces = [
    { binding = "kv", id = "f3f191a18c474989b97755cd2a938089" },
]